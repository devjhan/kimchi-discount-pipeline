# ============================================================
# Stage 4 — Thesis Discipline Gate
# ============================================================
thesis:
  required_fields:
    - entry_catalyst
    - falsifier
    - time_horizon_months
    - edge_source
    - asymmetry_score
  falsifier_categories:
    time_cap:
      pattern: "X months no catalyst Y"
      max_months: 36
    metric_trigger:
      pattern: "metric Z reaches W"
    event_trigger:
      pattern: "specific event V occurs"
  falsifier_vague_patterns_reject:
    - "실적 안 좋으면"
    - "thesis 깨지면"
    - "전망 나빠지면"
    - "기대대로 안 가면"
    - "if it doesn't work out"
  edge_source:
    must_specify_one_of: ["A", "B", "C", "D"]
    a_information_warning: true
    require_c_or_d_for_high_conviction: true
  asymmetry:
    min_ratio: 2.0                        # downside_floor / upside_ceiling
    reject_below_min: false                # false면 size 절반 cap
    half_size_below_ratio: 3.0
  time_horizon_months:
    min: 6
    max: 60
    typical: [12, 36]

  # ============================================================
  # Stage 5d — Thesis Expiry Monitor
  # ============================================================
  # 모든 active thesis (status='open') 의 entry_date + time_horizon_months
  # 기준 만료 추적. falsifier 카테고리 무관 — falsifier_proximity (Stage 5b) 와
  # 별도 helper. domains.risk_engine.thesis_expiry_monitor 가 single source.
  #
  # tier:
  #   notice   T-90 days   informational, brief 본문 surface 안 함 (옵션)
  #   warn     T-30 days   brief 본문 thesis 섹션에 marker
  #   expired  T-0  days   brief 첫 줄 alert
  #   overdue  T+30 days   brief 첫 줄 alert (강화 — re-evaluation 필요)
  expiry_alert:
    tiers:
      notice_days:   90
      warn_days:     30
      expired_days:   0
      overdue_days: -30
    surface_in_brief: true

# ============================================================
# Stage 5 — Sizing
# ============================================================
sizing:
  kelly:
    fraction: 0.25                        # quarter-Kelly default
    portfolio_kelly_cap: 0.5              # 합산 Kelly 0.5 초과 금지
  per_position:
    max_pct: 0.25                         # 단일 종목 25% cap
    min_pct: 0.02                         # 최소 진입 사이즈
  drawdown_brake:
    threshold_pct: 0.15                   # -15% 도달 시
    action: "halve_all_sizes"
    reset_threshold_pct: 0.05             # +5% 회복 시 brake 해제
  requires_user_input:
    portfolio_context: true               # 사용자 자본 / 변동성 허용 입력 필수
    output_size_without_input: false      # 입력 없으면 사이즈 출력 보류

# ============================================================
# Falsifier Proximity (Stage 5b)
# ============================================================
# 보유 포지션의 falsifier 근접도 일별 monitoring 임계값.
# domains/risk_engine/falsifier_proximity.py 가 single source.
# inverse = 1 - distance_ratio  (0=entry, 1=trigger 발동)
#   inverse <  low_max     → 'low'
#   inverse <  medium_max  → 'medium'
#   else                   → 'high'  (needs_user_decision)
# ============================================================
falsifier:
  proximity_bands:
    low_max: 0.5
    medium_max: 0.9
  alert_channels:
    high: ["push_notification"]      # 알림 채널 — manual notification helper 책임
    medium: []
    low: []

# ============================================================
# Cross-cutting Enforcement
# ============================================================
enforcement:
  forbidden_language:
    recommendation:
      - "should buy"
      - "should sell"
      - "looks bullish"
      - "looks bearish"
      - "guaranteed"
      - "sure thing"
      - "no-brainer"
      - "must hold"
      - "set to rise"
      - "set to fall"
    statistical:                          # sample size 미충족 시 차단
      - phrase: "outperformed the market"
        requires_n: 30
      - phrase: "alpha confirmed"
        requires_n: 100
      - phrase: "strategy proven"
        requires_n: 100
      - phrase: "beats benchmark"
        requires_n: 30
    valuation:
      - "undervalued"                     # 단독 사용 금지, evidence 필요
      - "long-term winner"                # falsifier 없으면 금지
  numbers_evidence_required:
    all_numbers_in_output_must_cite_helper: true
    citation_format: "{source}@{ISO_timestamp}={value}"
    examples:
      - "Yahoo@2026-05-03T16:00=178.50"
      - "DART@2026-05-03={\"공시번호\":20260503000456,\"type\":\"자사주_소각\"}"
      - "FRED@2026-05-03=DGS10:4.25"
  external_signal:
    only_via_explicit_ingest_command: true
    ingest_redaction_required: true
  default_action:
    most_days_no_new_candidate: true
    matrix_unchanged_alert: true          # 일주일 변화 0이면 정상 신호

# ============================================================
# Statistical Honesty + Self-Disable
# ============================================================
statistics:
  sample_gates:
    n_min_for_directional: 10
    n_min_for_t_stat: 30
    n_min_for_p_010: 30
    n_min_for_p_005: 100
  benchmark_tiers:
    tier_0_passive_index: "SPY+KOSPI200 50/50"
    tier_1_mechanical: "score-only top-K, no LLM"
    tier_2_llm_filtered: "system actual recommendations"
    tier_3_random: "random K from same A∩C universe"
  shadow_portfolio:
    update_frequency: "daily"
    rebalance_method: "buy-and-hold-snapshot"
    initial_capital_krw: 100000000        # 1억원 paper-trade baseline
    # 결정론 엔진 (domains/audit_integrity, F-6) knobs:
    top_k: 5                              # tier_1/tier_3 동일비중 slot 수
    max_hold_days: 30                     # tier_1(catalyst 미갱신)/tier_3 보유 만료
    rebalance_threshold_pct: 0.05         # tier_0 weight drift 리밸런스 임계
    tier0_tickers: ["US:SPY", "KR:069500"]  # passive_index 50/50 (SPY + KODEX200)
  outcome_audit_frequency:
    weekly: "process audit (rule violation check)"
    quarterly: "outcome vs benchmarks"
    annual: "full review + self-disable check"
  self_disable_trigger:
    # 단순 부호만 비교하면 noise 흔들림 → Welch t-test p-value 결합으로 강화.
    # 산출 helper: domains/audit_integrity/stat_tests.evaluate_self_disable_trigger
    condition: "tier_2 < tier_1 for 4 consecutive quarters AND Welch p_two_sided < p_max"
    consecutive_required: 4               # 4분기 연속 부호 음수
    p_max: 0.10                           # Welch t-test two-sided p-value cap
    action: "alert + require user re-engineering decision"
    minimum_quarters_before_check: 4      # 1년 누적 후부터 검사
  bootstrap:
    iters: 10000
    seed: 42
