schema: "policy-profile-v1"
version: 1
description: "ROIC + 부채 + 현금흐름 + 자본배분 기본 퀄리티 통과 게이트"
scope: "global"
key: "quality_floor"

# ADR-0014: 전 정책 tier 가 scope 미러 트리로 정렬 — global 정책도 versioned-dir
# (profiles/global/<name>/v<N>.yaml) 로 통일 (구 global/profiles/<name>.yaml flat).
# ADR-0013 Q2: 구 screener-profile-v1 → 통합 policy-profile-v1 로 수렴 (rule: →
# cutoff_rules:, scope/key 추가). cutoff *평가* 는 여전히 screener RuleFactory 소유 —
# _boundary.load_profile 이 cutoff_rules 를 RuleFactory 가 기대하는 rule 트리로 어댑트한다.

# profile 자체가 SSoT — 별도 thresholds.yaml 없음.
# 정량 임계값은 cutoff_rules.children 의 threshold/scoring params 에 직접 명시.
# 상수 (tax_rate / cache TTL) 는 strategy YAML 의 constants 에서 주입.

# global scope 는 universe 보강을 강제하지 않음 (per-ticker/segment 가 담당).
required_enrichments: []

# LLM 정성 검증 메타 — investment-stage2-quality-lens skill 의 4 lens 정의.
# 본 profile 의 cutoff 평가 결과 (pass) 종목에만 lens 적용.
qualitative_lenses:
  - "moat (산업 점유, 브랜드, 진입장벽)"
  - "자본배분 합리성 (소각 의지 / 재투자 ROI)"
  - "회계 적신호 (영업CF vs 순이익 괴리, 충당금 패턴)"
  - "지주사 자회사 산업 매력도 (지주사 한정)"

cutoff_rules:
  type: "and"
  name: "quality_floor"
  children:
    - type: "threshold"
      name: "roic_3y_avg"
      metric_path: "annuals_avg.roic"
      period_years: 3
      op: "ge"
      threshold: 0.10                  # 10% (3년 평균)

    - type: "threshold"
      name: "debt_to_equity"
      metric_path: "latest_annual.debt_to_equity"
      op: "le"
      threshold: 1.0                   # 부채비율 100%

    - type: "threshold"
      name: "interest_coverage"
      metric_path: "latest_annual.interest_coverage"
      op: "ge"
      threshold: 4.0

    - type: "threshold"
      name: "fcf_positive_years"
      metric_path: "fcf_positive_years"
      period_years: 3
      op: "ge"
      threshold: 3                     # 최근 3년 중 3년 모두 FCF 양수

    - type: "threshold"
      name: "fcf_to_revenue_ttm"
      metric_path: "ttm.fcf_to_revenue"
      op: "ge"
      threshold: 0.05                  # FCF margin 5%

    - type: "signal_presence"
      name: "capital_allocation"
      required_any_of:
        - dividend_payment
        - treasury_share_purchase
        - treasury_share_cancellation

provenance:
  committed_at: "2026-06-13T15:00:00+09:00"
  committed_by: manual
  trigger: manual
  citations: []
  rationale_ko: "전 universe 공통 quality floor 초기 버전 (ADR-0013 통합 → ADR-0014 versioned)."
