schema: policy-profile-v1
version: 1
description: LG(주)는 자산 대부분이 상장·비상장 자회사 지분인 지주회사로, 시총이 자회사 지분가치 합에 못 미치는 NAV 할인 가치주다(사업보고서
  2025.12, DART@2026-03-18=rcept_no:20260318001025). 자사주 소각(DART@2026-05-22=rcept_no:20260522800934)·기업가치제고계획·배당
  등 주주환원 촉매가 활성화되어 NAV 할인 축소 thesis의 D/B-type edge가 작동한다(DART@2026-03-26=rcept_no:20260326803162).
  대형 holdco 보수 floor로 NAV 할인 50%+ 구간에서만, 그리고 자본배분 신호(자사주 소각/배당/자사주 매입 중 1+) 동반을 필수
  조건으로 진입하며, 정량 NAV 할인%는 nav_discount enricher가 런타임에 산출한다.
scope: ticker
key: KR:003550
required_enrichments:
- nav_discount
cutoff_rules:
  type: and
  name: kr003550_holdco_value_cutoff
  children:
  - type: threshold
    name: nav_discount_floor
    metric_path: enrichments.nav_discount.discount_pct
    op: ge
    threshold: 0.5
  - type: signal_presence
    name: capital_allocation
    required_any_of:
    - treasury_share_cancellation
    - dividend_payment
    - treasury_share_purchase
